<!DOCTYPE html> 
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lembretes</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css" rel="stylesheet">
</head>

<body class="text-white">

<!-- LOGIN -->
<div id="auth" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-gray-900 p-6 rounded-xl w-80 text-center">
    <h2 class="text-2xl mb-4">Login / Cadastro</h2>

    <input id="usuario" type="text" placeholder="Usuário" class="w-full mb-2 p-2 rounded bg-gray-800 text-white">
    <input id="senha" type="password" placeholder="Senha" class="w-full mb-4 p-2 rounded bg-gray-800 text-white">

    <button onclick="cadastrar()" class="w-full mb-2 bg-blue-500 p-2 rounded">Cadastrar</button>
    <button onclick="login()" class="w-full bg-green-500 p-2 rounded">Entrar</button>
  </div>
</div>

<!-- VÍDEO DE FUNDO -->
<video autoplay muted loop playsinline class="fixed top-0 left-0 w-full h-full object-cover -z-10">
  <source src="Videos/Natureza.mp4" type="video/mp4">
</video>

<!-- HEADER -->
<header id="headerApp" class="p-4 relative hidden">
  <div class="relative inline-block">
    <button id="menuBtn" class="p-2 bg-black text-white rounded-xl">
      <i class="ri-menu-line text-2xl"></i>
    </button>

    <nav id="menu" class="hidden absolute top-full left-0 mt-2 bg-gray-900 text-white p-4 rounded-xl shadow-xl w-44 z-20">
      <ul class="space-y-3">
        <li onclick="trocarCategoria('atual')" class="cursor-pointer flex items-center gap-2">
          <span class="w-3 h-3 bg-blue-400 rounded-full"></span>
          Atual
        </li>

        <li onclick="trocarCategoria('pendente')" class="cursor-pointer flex items-center gap-2">
          <span class="w-3 h-3 bg-red-500 rounded-full"></span>
          Pendente
        </li>

        <li onclick="trocarCategoria('concluido')" class="cursor-pointer flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span>
          Concluído
        </li>

        <li onclick="logout()" class="text-red-400 cursor-pointer">Sair</li>
      </ul>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main id="app" class="p-4 hidden">

<section id="bloco-atual" class="categoria">
  <h2 class="flex items-center gap-2 text-3xl font-bold text-black mb-4">
    <span class="w-3 h-3 bg-blue-400 rounded-full"></span>
    Atual
  </h2>

  <button class="btn-add mb-4 px-4 py-2 bg-blue-500 text-white rounded-lg" data-target="cards-atual">
    + Adicionar
  </button>

  <div id="cards-atual" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</section>

<section id="bloco-pendente" class="categoria hidden">
  <h2 class="flex items-center gap-2 text-3xl font-bold text-black mb-4">
    <span class="w-3 h-3 bg-red-500 rounded-full"></span>
    Pendente
  </h2>

  <button class="btn-add mb-4 px-4 py-2 bg-red-500 text-white rounded-lg" data-target="cards-pendente">
    + Adicionar
  </button>

  <div id="cards-pendente" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</section>

<section id="bloco-concluido" class="categoria hidden">
  <h2 class="flex items-center gap-2 text-3xl font-bold text-black mb-4">
    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
    Concluído
  </h2>

  <button class="btn-add mb-4 px-4 py-2 bg-green-500 text-white rounded-lg" data-target="cards-concluido">
    + Adicionar
  </button>

  <div id="cards-concluido" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</section>

</main>

<script>
// LOGIN
function cadastrar() {
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  if (!usuario || !senha) return alert("Preencha tudo");

  localStorage.setItem("user_" + usuario, senha);
  alert("Cadastrado!");
}

function login() {
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  const senhaSalva = localStorage.getItem("user_" + usuario);

  if (senhaSalva === senha) {
    localStorage.setItem("usuarioLogado", usuario);

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("headerApp").classList.remove("hidden");

    carregarDados();
  } else {
    alert("Login inválido");
  }
}

function logout() {
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

// MENU
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden");
});

document.addEventListener("click", (e) => {
  if (!btn.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.add("hidden");
  }
});

// CARDS
function criarCard(texto = "") {
  const card = document.createElement("div");
  card.className = "relative bg-gray-800/90 p-4 rounded-xl aspect-square shadow-lg backdrop-blur-sm";

  card.innerHTML = `
    <button class="absolute top-2 right-2 text-red-400">
      <i class="ri-close-line text-xl"></i>
    </button>
    <textarea class="w-full h-full bg-transparent resize-none text-white">${texto}</textarea>
  `;

  const textarea = card.querySelector("textarea");
  const btnExcluir = card.querySelector("button");

  textarea.addEventListener("input", salvarDados);

  btnExcluir.addEventListener("click", () => {
    card.remove();
    salvarDados();
  });

  return card;
}

// SALVAR
function salvarDados() {
  const usuario = localStorage.getItem("usuarioLogado");
  if (!usuario) return;

  const dados = { atual: [], pendente: [], concluido: [] };

  document.querySelectorAll("#cards-atual textarea").forEach(t => dados.atual.push(t.value));
  document.querySelectorAll("#cards-pendente textarea").forEach(t => dados.pendente.push(t.value));
  document.querySelectorAll("#cards-concluido textarea").forEach(t => dados.concluido.push(t.value));

  localStorage.setItem("lembretes_" + usuario, JSON.stringify(dados));
}

// CARREGAR
function carregarDados() {
  const usuario = localStorage.getItem("usuarioLogado");
  if (!usuario) return;

  const dados = JSON.parse(localStorage.getItem("lembretes_" + usuario));
  if (!dados) return;

  ["atual","pendente","concluido"].forEach(cat => {
    const container = document.getElementById("cards-" + cat);
    container.innerHTML = "";

    dados[cat].forEach(texto => {
      container.appendChild(criarCard(texto));
    });
  });
}

// ADICIONAR

document.querySelectorAll(".btn-add").forEach(botao => {
  botao.addEventListener("click", () => {
    const target = botao.dataset.target;
    const container = document.getElementById(target);
    container.appendChild(criarCard());
    salvarDados();
  });
});

// TROCAR
function trocarCategoria(nome) {
  document.querySelectorAll(".categoria").forEach(c => c.classList.add("hidden"));
  document.getElementById("bloco-" + nome).classList.remove("hidden");
  menu.classList.add("hidden");
}

// AUTO LOGIN
window.onload = () => {
  const usuario = localStorage.getItem("usuarioLogado");

  if (usuario) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("headerApp").classList.remove("hidden");

    carregarDados();
  }
};
</script>

</body>
</html>
